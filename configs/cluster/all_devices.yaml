# device_group keys MUST match device ids in device_registry (e.g. legacy profile "device": "3060").
device_group:
  "3060": 1
  "2080super": 1
  "agx": 1
  "tx2": 1

designated_device: "3060"

network_bandwidth_mbps:
  default: 200.0

# Optional node metadata for runtime (not read by the solver today).
# nodes:
#   - worker_name: "3060_0"
#     device_type: "3060"
#     address: 192.168.1.10:50051
#   - worker_name: "2080super_0"
#     device_type: "2080super"
#     address: 192.168.1.11:50051

solve:
  registry_path: outputs\profiling\artifacts\registry\device_registry.v3.json
  model_config: configs\model\llama2_7b.yaml
  batch_size: 32
  target_seq_len: 64
  # Optional: KV-cache sizing for scheduler memory checks (base + max_seq_len * bs * kv_per_token_gb).
  # Omit or comment out to use target_seq_len for memory as well (legacy behavior).
  max_seq_len: 4096
  prefer_bs: 32
  use_fine_grained: false       
  tail_candidates: [1, 2, 3, 4, 5, 6, 7]
  out_dir: outputs/scheduler/export/coarse-grained-bs32-len64
