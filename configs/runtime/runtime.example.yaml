runtime:
  transport_mode: grpc
  grpc:
    use_streaming: false
    rpc_timeout_ms: 300000
    # Master GetNextWorker does not return until all workers registered; keep this comfortably above worst-case startup skew.
    registration_wait_timeout_ms: 600000
    # Raise gRPC message limits beyond the default 4MB to support large frame payloads.
    max_send_message_length: 16777216
    max_receive_message_length: 16777216
    # Nominal commBytes from strategy are divided by this factor for the actual dummy payload length (>=1).
    # Use >1 to shrink payloads when the LAN is slow and you want runs closer to compute/comm overlap settings.
    payload_size_divisor: 16.0
  queues:
    task_queue_maxsize: 2048
    send_queue_maxsize: 2048
  scheduling:
    strict_ordering: false
    max_in_flight_requests: 16
  execution:
    mode: sleep_executor
    # sleep_executor only: add ms to profiled compute before sleeping (negative = shorten sleep).
    # Keys must match pipeline worker_name (e.g. 3060_0, agx_0). Missing names use default_compute_sleep_offset_ms.
    sleep_executor:
      default_compute_sleep_offset_ms: 0.0
      worker_compute_sleep_offset_ms: {"3060_0": 0.0, "2080super_0": 0.0, "agx_0": 0.0, "tx2_0": 0.0}
    shape_executor:
      enable_sdpa: false
      random_seed: 42
      # Shared KV pools and synthetic-op bounds (shape_executor only; requires torch).
      max_batch_size: 32
      max_seq_len: 4096
      device: cuda:0
  observability:
    metrics_enabled: true
    tracing_enabled: true
